{% load socialaccount %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SampleStore{% endblock %}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 42rem; margin: 3rem auto; padding: 0 1rem; line-height: 1.5; }
    code { background: #f2f2f2; padding: 0.1rem 0.3rem; border-radius: 3px; }
    .muted { color: #666; }
    a.button, button { display: inline-block; padding: 0.4rem 0.8rem; border: 1px solid #888; border-radius: 4px; background: #fafafa; text-decoration: none; color: inherit; cursor: pointer; }
  </style>
</head>
<body>
  <h1>SampleStore <span class="muted">(Django demo RP)</span></h1>
  {% block content %}{% endblock %}
</body>
</html>
