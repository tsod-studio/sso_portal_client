repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-ast
      - id: check-docstring-first
      - id: check-symlinks
      - id: detect-private-key
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
      - id: debug-statements
      - id: no-commit-to-branch
        args: [--branch, main]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        args: [sso_portal_client/, example_project/]
        types: [python]
        pass_filenames: false

      - id: bandit
        name: bandit
        entry: uv run bandit
        language: system
        args: [-c, pyproject.toml, -r, sso_portal_client/, example_project/]
        types: [python]
        pass_filenames: false

      - id: django-check
        name: django system check (example_project)
        entry: uv run python example_project/manage.py check --fail-level WARNING
        language: system
        always_run: true
        pass_filenames: false

      - id: django-migrations
        name: django migrations check (example_project)
        entry: uv run python example_project/manage.py makemigrations --check --dry-run
        language: system
        always_run: true
        pass_filenames: false

      - id: pip-audit
        name: pip-audit
        entry: uv run pip-audit
        language: system
        pass_filenames: false
        files: (pyproject\.toml|uv\.lock)

      - id: pytest
        name: pytest + coverage
        entry: >-
          bash -c 'uv run coverage run -m pytest --tb=short --no-header -q &&
          uv run coverage run --append example_project/manage.py test store -v 0 &&
          uv run coverage report'
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, refactor, docs, style, test, chore, perf, ci, revert, build, infra]
